# =============================================================================
# ~/.tmux.conf  (modern rewrite of mincemaker's 2009 config)
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix: C-z
# -----------------------------------------------------------------------------
set -g prefix C-z
unbind C-b

# -----------------------------------------------------------------------------
# 基本設定
# -----------------------------------------------------------------------------
set -g repeat-time 1000
set -g history-limit 50000
set -g escape-time 10          # Neovim推奨値
set -g focus-events on         # vim-gitgutter等のfocusイベント対応
set -s extended-keys on        # モディファイアキー対応

# -----------------------------------------------------------------------------
# True Color
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# -----------------------------------------------------------------------------
# マウス・クリップボード
# -----------------------------------------------------------------------------
set -g mouse on
set -g set-clipboard on        # OSC52経由でSSH越しにもコピー

# -----------------------------------------------------------------------------
# ウィンドウ・ペイン
# -----------------------------------------------------------------------------
set -g base-index 1            # 0始まりは押しにくい
set -g pane-base-index 1
set -g renumber-windows on     # ウィンドウ削除後に番号詰める
setw -g automatic-rename off
setw -g mode-keys vi

# -----------------------------------------------------------------------------
# ステータスバー
# -----------------------------------------------------------------------------
set -g status-interval 5
set -g status-left-length 20
set -g status-right-length 60

set -g status-style                 "bg=black,fg=white"
set -g status-left                  "#[fg=cyan,bold][#H:#S]#[default] "
set -g status-right                 "#[fg=magenta,bold]#{?#{==:#{pane_current_command},load.sh},,#(load.sh)}#[default] |#[fg=green,bold] %a %m/%d %H:%M#[default]"

set -g message-style                "bold,fg=white,bg=red"
setw -g mode-style                  "bg=white,fg=black"
setw -g window-status-style         "fg=white,bg=black"
setw -g window-status-current-style "fg=green,bg=black,bold"  # 元設定のfg重複バグを修正
setw -g window-status-format        " #I:#W "
setw -g window-status-current-format " #I:#W "

set -g pane-border-style            "fg=cyan,bg=default"
set -g pane-active-border-style     "fg=green,bg=default"

# -----------------------------------------------------------------------------
# キーバインド
# -----------------------------------------------------------------------------
unbind l
unbind ^C

# config再読み込み
bind C-r source ~/.tmux.conf \; display "Reloaded!"

# ウィンドウ操作
bind -r C-n next-window
bind    C-z last-window
bind    ^A  last-window
bind    c   new-window -c "#{pane_current_path}"   # 現在ディレクトリ引き継ぎ

# ペイン分割 (現在パスを引き継ぐように変更)
bind 1 break-pane
bind 2 split-window -v -c "#{pane_current_path}"
bind 3 split-window -h -c "#{pane_current_path}"

# ペインリサイズ
bind -r C-h resize-pane -L 6
bind -r C-l resize-pane -R 6
bind -r C-j resize-pane -D 6
bind -r C-k resize-pane -U 6

# ペイン操作
bind -r s swap-pane -U
bind    k kill-pane
bind    K kill-window
bind    i display-panes

# コピーモード (vi)
bind    y copy-mode
bind    p paste-buffer
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# リネーム
unbind A
bind A command-prompt "rename-window %%"

# レイアウトマクロ
bind -r H select-layout main-vertical   \; swap-pane -s : -t 0 \; select-pane -t 0 \; resize-pane -R 9
bind -r K select-layout main-horizontal \; swap-pane -s : -t 0 \; select-pane -t 0 \; resize-pane -D 18

# canything → fzf + popup に置き換え
bind b display-popup -E \
  "tmux lsw | fzf --reverse | cut -d: -f1 | xargs -I{} tmux select-window -t {}"

# ウィンドウ・セッション一覧 (choose-tree は標準搭載)
bind w choose-tree -Zw

# -----------------------------------------------------------------------------
# プラグイン (TPM: github.com/tmux-plugins/tpm)
# インストール: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# 初回: prefix + I
# -----------------------------------------------------------------------------
